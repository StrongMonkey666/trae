[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
markers =
    network: 需要联网的真实数据源集成测试，默认跳过（用 -m network 启用）
    slow: 性能/基准测试（>1s），默认跳过（用 -m slow 启用）
    benchmark: 性能基准测试，用于回归
filterwarnings =
    ignore::DeprecationWarning
