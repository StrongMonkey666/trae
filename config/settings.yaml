project:
  name: quant_platform
  version: '2.0'
  description: 股票量化回测系统
data_service:
  storage:
    sqlite_path: data/sqlite/quant.db
    hdf5_path: data/hdf5/market.h5
  cache:
    history_years: 10
    incremental_realtime_seconds: 3
  source_priority:
  - akshare
  - tushare
  - eastmoney
  realtime_source: akshare
data_sources:
  akshare:
    enabled: true
    timeout: 15
  tushare:
    enabled: false
    token: ''
    timeout: 15
  eastmoney:
    enabled: true
    timeout: 15
trading_calendar:
  holidays_api: ''
scheduler:
  enabled: true
  jobs:
    realtime_poll:
      trigger: interval
      seconds: 3
      only_trading_day: true
    daily_full_check:
      trigger: cron
      hour: 16
      minute: 0
      only_trading_day: true
llm:
  api_key: sk-12345678
  base_url: https://api.openai.com/v1
  model: persist-test
  timeout: 30
notify:
  enabled: false
  smtp_host: ''
  smtp_port: 465
  smtp_user: ''
  smtp_password: my-secret-pw
  smtp_ssl: true
  from_addr: ''
  to_addrs: ''
logging:
  level: INFO
  file: logs/quant_platform.log
  max_bytes: 10485760
  backup_count: 5
